name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project (dev)
        run: |
          python -m pip install --upgrade pip
          # editable install + dev extra з pyproject.toml
          pip install -e ".[dev]"
          pip install ruff bandit pip-audit

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: SAST (bandit)
        run: |
          bandit -r src -q

      - name: Dependency scan (pip-audit)
        run: |
          # аудит встановлене середовище
          pip-audit

      - name: Run tests (pytest)
        run: |
          pytest -vv
      - name: Clean python cache
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} +
      - name: Create tmp index
        run: |
          mkdir -p src/tmp
          echo "" > src/tmp/index.html
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./src/
          server-dir: /flask/
