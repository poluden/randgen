apiVersion: v1
kind: ServiceAccount
metadata:
  name: randgen-reader-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: randgen-pod-reader-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: randgen-pod-reader-binding
subjects:
  - kind: ServiceAccount
    name: randgen-reader-sa
roleRef:
  kind: Role
  name: randgen-pod-reader-role
  apiGroup: rbac.authorization.k8s.io
